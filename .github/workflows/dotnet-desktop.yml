# Builds, tests and publishes SourceLens for Windows (x64) and Linux (x64).
# Runs ONLY on pushes to main; nothing happens on other branches or PRs.
# Each run creates a GitHub Release v1.1.<run_number> with self-contained archives.

name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve version
        run: |
          PREFIX=$(dotnet msbuild src/SourceLens/SourceLens.csproj -getProperty:VersionPrefix)
          echo "VERSION=${PREFIX}.${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Test
        run: dotnet test src/SourceLens.Tests/SourceLens.Tests.csproj -c Release

      - name: Publish linux-x64
        run: >
          dotnet publish src/SourceLens/SourceLens.csproj
          -c Release -r linux-x64 --self-contained true
          -p:Version=${{ env.VERSION }}
          -o publish/linux-x64

      - name: Publish win-x64
        run: >
          dotnet publish src/SourceLens/SourceLens.csproj
          -c Release -r win-x64 --self-contained true
          -p:Version=${{ env.VERSION }}
          -o publish/win-x64

      - name: Package
        run: |
          tar -czf SourceLens-${VERSION}-linux-x64.tar.gz -C publish/linux-x64 .
          (cd publish/win-x64 && zip -qr "${GITHUB_WORKSPACE}/SourceLens-${VERSION}-win-x64.zip" .)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "v${VERSION}"
          "SourceLens-${VERSION}-linux-x64.tar.gz"
          "SourceLens-${VERSION}-win-x64.zip"
          --title "SourceLens v${VERSION}"
          --generate-notes
